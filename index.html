<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dilara Puzzle ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

.container{
width:95vw;
max-width:420px;
text-align:center;
}

h1{
margin-bottom:15px;
}

#board{
width:100%;
aspect-ratio:1;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:2px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.tile{
background-image:url.tile{
background-image:url("c35a3df7-4083-4f0d-8593-a1531238e861.jpeg");
background-size:300% 300%;
background-repeat:no-repeat;
cursor:pointer;
transition:transform .2s, filter .2s;
}

.tile:hover{
transform:scale(1.03);
filter:brightness(1.1);
}
}

.empty{
background:#000;
}

#info{
margin-top:15px;
font-size:20px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff4081;
color:white;
cursor:pointer;
}

#winScreen{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);

display:none;

justify-content:center;
align-items:center;
flex-direction:column;

z-index:1000;

}

#message{

font-size:42px;
font-weight:bold;
text-align:center;
color:#ff4fa3;

animation:pulse 1s infinite;

padding:20px;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}

}

.heart{

position:absolute;
font-size:30px;
animation:fall 5s linear infinite;

}

@keyframes fall{

0%{

transform:translateY(-100px);

opacity:1;

}

100%{

transform:translateY(120vh);

opacity:0;

}

}

</style>

</head>

<body>

<div class="container">

<h1>🧩 Dilara Puzzle ❤️</h1>

<div id="board"></div>

<div id="info">

Hamle:
<span id="moves">0</span>

</div>

<button id="shuffleBtn">

Karıştır

</button>

</div>

<div id="winScreen">

<div id="message">

SENİ ÇOK SEVİYORUM DİLARA ❤️

</div>

</div>

<script>
const board=document.getElementById("board");
const shuffleBtn=document.getElementById("shuffleBtn");
const winScreen=document.getElementById("winScreen");

let tiles=[1,2,3,4,5,6,7,8,0];
let moves=0;

function draw(){

board.innerHTML="";

tiles.forEach((n,index)=>{

const div=document.createElement("div");

if(n===0){

div.className="tile empty";

}else{

div.className="tile";

const x=(n-1)%3;
const y=Math.floor((n-1)/3);

div.style.backgroundPosition=`${x*50}% ${y*50}%`;

div.onclick=()=>move(index);

}

board.appendChild(div);

});

}

function move(index){

const empty=tiles.indexOf(0);

const ok=[];

if(empty>=3) ok.push(empty-3);
if(empty<=5) ok.push(empty+3);
if(empty%3!==0) ok.push(empty-1);
if(empty%3!==2) ok.push(empty+1);

if(ok.includes(index)){

[tiles[index],tiles[empty]]=[tiles[empty],tiles[index]];

moves++;

document.getElementById("moves").textContent=moves;

draw();

checkWin();

}

}

function shuffle(){

for(let i=0;i<400;i++){

const empty=tiles.indexOf(0);

const arr=[];

if(empty>=3) arr.push(empty-3);
if(empty<=5) arr.push(empty+3);
if(empty%3!==0) arr.push(empty-1);
if(empty%3!==2) arr.push(empty+1);

const r=arr[Math.floor(Math.random()*arr.length)];

[tiles[r],tiles[empty]]=[tiles[empty],tiles[r]];

}

moves=0;

document.getElementById("moves").textContent="0";

draw();

}

shuffleBtn.onclick=shuffle;
function checkWin(){

const win=[1,2,3,4,5,6,7,8,0];

const finished=tiles.every((v,i)=>v===win[i]);

if(!finished) return;

winScreen.style.display="flex";

// Kalpler oluştur
for(let i=0;i<120;i++){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDelay=(Math.random()*5)+"s";

heart.style.fontSize=(20+Math.random()*35)+"px";

document.body.appendChild(heart);

}

// Mesajı animasyonlu göster
setTimeout(()=>{

document.getElementById("message").innerHTML=`
<div style="font-size:65px;">❤️</div>

<div>SENİ ÇOK</div>

<div>SEVİYORUM</div>

<div>DİLARA ❤️</div>

<br>

<div style="font-size:25px;">
Sen bu puzzle'ın en güzel parçasısın...
</div>

`;

},500);

}

draw();

shuffle();

</script>

</body>

</html>
